<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permaculture Plant Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
    }
    h1 { font-size: 1.4rem; }
    .search-box {
      position: relative;
      width: 100%;
    }
    input[type=search] {
      width: 100%;
      padding: .6rem .8rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    input[type=search]:focus { outline: 2px solid #4a7; border-color: #4a7; }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }
    .suggestions.open { display: block; }
    .suggestion {
      padding: .5rem .8rem;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .suggestion:hover, .suggestion.active { background: #e8f5e9; }
    .suggestion .sci { font-style: italic; }
    .suggestion .common { color: #666; font-size: .85rem; }
    #detail {
      margin-top: 2rem;
      display: none;
    }
    #detail.visible { display: block; }
    #detail h2 { font-style: italic; margin-bottom: .5rem; }
    table { border-collapse: collapse; width: 100%; }
    td, th {
      text-align: left;
      padding: .3rem .5rem;
      border-bottom: 1px solid #eee;
    }
    th { width: 40%; color: #555; }
  </style>
</head>
<body>

<h1>Permaculture Plant Search</h1>

<div class="search-box">
  <input type="search" id="q" placeholder="Type a plant name…"
         autocomplete="off" autofocus>
  <div class="suggestions" id="suggestions"></div>
</div>

<div id="detail">
  <h2 id="detail-name"></h2>
  <table id="detail-table"><tbody></tbody></table>
</div>

<script>
const input = document.getElementById('q');
const box = document.getElementById('suggestions');
const detail = document.getElementById('detail');
const detailName = document.getElementById('detail-name');
const detailBody = document.querySelector('#detail-table tbody');
let active = -1;
let items = [];
let timer = null;

input.addEventListener('input', () => {
  clearTimeout(timer);
  const q = input.value.trim();
  if (q.length < 1) { close(); return; }
  timer = setTimeout(() => fetchSuggestions(q), 200);
});

input.addEventListener('keydown', e => {
  if (!box.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
  else if (e.key === 'Enter' && active >= 0) {
    e.preventDefault();
    select(items[active].scientific_name);
  }
  else if (e.key === 'Escape') close();
});

function move(dir) {
  active = Math.max(-1, Math.min(items.length - 1, active + dir));
  render();
}

async function fetchSuggestions(q) {
  const res = await fetch('/api/plants?q=' + encodeURIComponent(q));
  items = await res.json();
  active = -1;
  render();
}

function render() {
  if (!items.length) { close(); return; }
  box.innerHTML = items.map((s, i) => {
    const cn = s.common_names.length ? s.common_names.join(', ') : '';
    return `<div class="suggestion${i === active ? ' active' : ''}"
                 data-name="${esc(s.scientific_name)}">
      <span class="sci">${esc(s.scientific_name)}</span>
      ${cn ? '<br><span class="common">' + esc(cn) + '</span>' : ''}
    </div>`;
  }).join('');
  box.classList.add('open');
  box.querySelectorAll('.suggestion').forEach(el => {
    el.addEventListener('mousedown', () => select(el.dataset.name));
  });
}

function close() { box.classList.remove('open'); items = []; active = -1; }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function select(name) {
  close();
  input.value = name;
  const res = await fetch('/api/plants/' + encodeURIComponent(name));
  const data = await res.json();
  showDetail(name, data);
}

function showDetail(name, data) {
  detailName.textContent = name;
  detailBody.innerHTML = '';
  renderObject(data, '');
  detail.classList.add('visible');
}

function renderObject(obj, prefix) {
  for (const [k, v] of Object.entries(obj).sort(([a], [b]) => a.localeCompare(b))) {
    const key = prefix ? prefix + ' / ' + k : k;
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      renderObject(v, key);
    } else {
      const tr = document.createElement('tr');
      tr.innerHTML = '<th>' + esc(key) + '</th><td>' + esc(String(v)) + '</td>';
      detailBody.appendChild(tr);
    }
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) close();
});
</script>
</body>
</html>
