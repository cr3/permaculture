<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Permaculture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 720px; margin: 2rem auto; padding: 0 1rem;
    color: #1a1a1a; background: #fafaf8;
  }
  h1 { margin-bottom: 1.5rem; font-size: 1.6rem; }
  h2 { margin: 1.5rem 0 .75rem; font-size: 1.2rem; }
  .search-box {
    position: relative; width: 100%;
  }
  input[type=search] {
    width: 100%; padding: .6rem .8rem; font-size: 1rem;
    border: 1px solid #ccc; border-radius: 6px;
  }
  .suggestions {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid #ddd; border-top: none;
    border-radius: 0 0 6px 6px; list-style: none;
    max-height: 300px; overflow-y: auto; z-index: 10;
    display: none;
  }
  .suggestions li {
    padding: .5rem .8rem; cursor: pointer;
  }
  .suggestions li:hover, .suggestions li.active {
    background: #e8f5e9;
  }
  .suggestions .sci { font-style: italic; }
  .suggestions .common { color: #666; font-size: .9em; }
  #detail { margin-top: 2rem; }
  #detail h2 { font-style: italic; }
  table {
    width: 100%; border-collapse: collapse; margin-top: .5rem;
  }
  th, td {
    text-align: left; padding: .4rem .6rem;
    border-bottom: 1px solid #eee;
  }
  th { width: 40%; color: #555; font-weight: 500; }
  .tag {
     display: inline-block; background: #e8f5e9; color: #2e7d32;
     padding: .15rem .5rem; border-radius: 12px; margin: .1rem;
     font-size: .85em;
   }
   .tag-false {
     background: #fdecea; color: #b3261e;
   }
  .lang-toggle {
    display: inline-flex; border: 1px solid #ccc; border-radius: 6px;
    overflow: hidden; float: right; margin-top: .2rem;
  }
  .lang-toggle button {
    padding: .3rem .7rem; border: none; background: #fff;
    cursor: pointer; font-size: .85rem; color: #555;
  }
  .lang-toggle button.active {
    background: #2e7d32; color: #fff;
  }
  .source-ref {
    font-size: .7em; vertical-align: super; color: #2e7d32;
    margin-left: .15em; text-decoration: none;
  }
  .source-ref:hover { text-decoration: underline; }
  .sources-footer {
    margin-top: 1.5rem; padding-top: .75rem;
    border-top: 1px solid #eee; font-size: .85rem; color: #555;
  }
  .sources-footer h3 { font-size: .95rem; margin-bottom: .4rem; }
  .sources-footer ol { padding-left: 1.2rem; }
  .sources-footer li { margin-bottom: .2rem; }
  .sources-footer a { color: #2e7d32; }
</style>
</head>
<body>
<h1>&#127793; Permaculture Plant Database
  <span class="lang-toggle">
    <button data-lang="en">EN</button>
    <button data-lang="fr">FR</button>
  </span>
</h1>

<div class="search-box">
  <input type="search" id="q" placeholder="Search plants&#8230;"
         autocomplete="off">
  <ul class="suggestions" id="suggestions"></ul>
</div>
<div id="detail"></div>

<script>
const q = document.getElementById('q');
const sugBox = document.getElementById('suggestions');
const detail = document.getElementById('detail');
const langButtons = document.querySelectorAll('.lang-toggle button');
let debounce;
let lang = navigator.language.startsWith('fr') ? 'fr' : 'en';
let cachedSearch = null;
let cachedDetail = null;

const i18n = {
  en: {
    title: '\u{1F331} Permaculture Plant Database',
    placeholder: 'Search plants\u2026',
    noData: 'No data found.',
    sources: 'Sources',
    t: {},
    tc: {},
  },
  fr: {
    title: '\u{1F331} Base de donn\u00E9es de plantes',
    placeholder: 'Rechercher des plantes\u2026',
    noData: 'Aucune donn\u00E9e trouv\u00E9e.',
    sources: 'Sources',
    t: {
      'acid': 'acide',
      'alkaline': 'alcalin',
      'avg': 'moy.',
      'bloom period': 'p\u00E9riode de floraison',
      'cold injury': 'blessure par le froid',
      'common names': 'noms communs',
      'disease issues': 'probl\u00E8mes de maladies',
      'drought': 's\u00E9cheresse',
      'edibility rating': 'comestibilit\u00E9',
      'edible uses': 'utilisations comestibles',
      'family': 'famille',
      'fire damage': 'dommages par le feu',
      'flood': 'inondation',
      'flower color': 'couleur de floraison',
      'foliage color': 'couleur de feuillage',
      'form': 'port',
      'frost tender': 'g\u00E9lif',
      'fruit period': 'p\u00E9riode de fructification',
      'fruit type': 'type de fruit',
      'fungal types': 'types de champignons',
      'growing season': 'saison de croissance',
      'growth habits': 'habitudes de croissance',
      'growth rate': 'taux de croissance',
      'habit': 'habitude',
      'hardiness': 'rusticit\u00E9',
      'heavy clay': 'argile lourde',
      'height': 'hauteur',
      'ingestors': 'sources de donn\u00E9es',
      'insect': 'insecte',
      'life span': 'dur\u00E9e de vie',
      'medicinal rating': 'usage m\u00E9dicinal',
      'moisture': 'humidit\u00E9',
      'mowing': 'tonte',
      'native to north america?': "originaire d'Am\u00E9rique du Nord?",
      'neutral': 'neutre',
      'nitrogen fixer': "fixateur d'azote",
      'pest damage': 'dommages par les ravageurs',
      'ph': 'pH',
      'plant binomial': 'bin\u00F4me',
      'plant category': 'cat\u00E9gorie de plante',
      'plant type': 'type de plante',
      'pollinators': 'pollinisateurs',
      'poor soil': 'sol pauvre',
      'related': 'apparent\u00E9',
      'root depth': 'profondeur racinaire',
      'root type': 'type de racine',
      'saline': 'salin',
      'salt': 'sel',
      'scented': 'parfum\u00E9',
      'scientific name': 'nom scientifique',
      'seasonal interest': 'int\u00E9r\u00EAt saisonnier',
      'self-fertile': 'autofertile',
      'shape': 'forme',
      'soil': 'sol',
      'soil compaction': 'compaction du sol',
      'soil type': 'type de sol',
      'sources': 'sources',
      'species': 'esp\u00E8ce',
      'spread': '\u00E9talement',
      'stand persistence': 'persistance',
      'sun': 'soleil',
      'uk': 'R.-U.',
      'well-drained': 'bien drain\u00E9',
      'width': 'largeur',
      'wind': 'vent',
      'wind storm damage': 'dommages par le vent',
      'achene': 'ak\u00E8ne',
      'apomictic': 'apomictique',
      'cool-warm': 'frais-chaud',
      'endomycorrhizal': 'endomycorhizien',
      'fast': 'rapide',
      'fall': 'automne',
      'herbaceous': 'herbac\u00E9',
      'infrequent': 'rare',
      'minor': 'mineur',
      'moderate': 'mod\u00E9r\u00E9',
      'perennial': 'vivace',
      'spring': 'printemps',
      'summer': '\u00E9t\u00E9',
      'tolerant': 'tol\u00E9rant',
      'upright': '\u00E9rig\u00E9',
      'winter': 'hiver',
      'yellow': 'jaune',
    },
    tc: {
      'life span': { 'long': 'longue' },
      'moisture': { 'dry': 'sec', 'moist': 'humide' },
      'native to north america?': { 'no': 'non' },
      'pollinators': { 'insects': 'insectes', 'self': 'auto' },
      'root type': { 'tap': 'pivotante' },
      'soil type': { 'clay': 'argile', 'loamy': 'limoneux', 'sandy': 'sableux', 'silty': 'silteux' },
      'stand persistence': { 'long': 'longue' },
      'sun': { 'full': 'plein soleil', 'partial': 'mi-ombre' },
      'texture': { 'medium': 'moyen' },
    },
  },
};

function tr(msg, context) {
  const loc = i18n[lang] || {};
  if (context && loc.tc?.[context]?.[msg] !== undefined) return loc.tc[context][msg];
  if (loc.t?.[msg] !== undefined) return loc.t[msg];
  return msg;
}

function setLang(l) {
  lang = l;
  const t = i18n[lang] || i18n.en;
  langButtons.forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.documentElement.lang = l;
  document.querySelector('h1').firstChild.textContent = t.title + ' ';
  q.placeholder = t.placeholder;
  if (cachedSearch) renderSearch(cachedSearch);
  if (cachedDetail) renderDetail(cachedDetail);
}

langButtons.forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
setLang(lang);

// Load plant from URL on initial page load and back/forward navigation.
const initPlant = new URL(window.location).searchParams.get('plant');
if (initPlant) lookup(initPlant);
window.addEventListener('popstate', () => {
  const name = new URL(window.location).searchParams.get('plant');
  if (name) lookup(name);
  else { q.value = ''; detail.innerHTML = ''; }
});

q.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(search, 200);
});

q.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('li');
  const cur = sugBox.querySelector('.active');
  let idx = [...items].indexOf(cur);
  if (e.key === 'ArrowDown') { e.preventDefault(); idx++; }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx--; }
  else if (e.key === 'Enter' && cur) { e.preventDefault(); cur.click(); return; }
  else if (e.key === 'Escape') { sugBox.style.display = 'none'; return; }
  else return;
  if (idx < 0) idx = items.length - 1;
  if (idx >= items.length) idx = 0;
  items.forEach(i => i.classList.remove('active'));
  items[idx]?.classList.add('active');
});

async function search() {
  const val = q.value.trim();
  if (val.length < 1) { sugBox.style.display = 'none'; return; }
  const r = await fetch('/permaculture/plants?q=' + encodeURIComponent(val));
  cachedSearch = await r.json();
  renderSearch(cachedSearch);
}

function renderSearch(plants) {
  sugBox.innerHTML = '';
  for (const p of plants) {
    const li = document.createElement('li');
    const sciName = p['scientific name'];
    const commonNames = p['common names'];
    const common = commonNames.length ? ' \u2014 ' + commonNames.join(', ') : '';
    li.innerHTML = '<span class="sci">' + esc(sciName) + '</span>'
      + '<span class="common">' + esc(common) + '</span>';
    li.addEventListener('click', () => lookup(sciName));
    sugBox.appendChild(li);
  }
  sugBox.style.display = plants.length ? 'block' : 'none';
}

async function lookup(name) {
  sugBox.style.display = 'none';
  q.value = name;
  const url = new URL(window.location);
  url.searchParams.set('plant', name);
  history.pushState(null, '', url);
  const r = await fetch('/permaculture/plants/' + encodeURIComponent(name));
  cachedDetail = await r.json();
  renderDetail(cachedDetail);
}

function renderDetail(data) {
  const t = i18n[lang] || i18n.en;
  if (!Object.keys(data).length) { detail.innerHTML = '<p>' + esc(t.noData) + '</p>'; return; }

  const sources = data.sources || {};
  const ingestors = data.ingestors || {};
  const commonNames = data.common_names || [];
  const sciName = data.scientific_name || '';
  const chars = data.characteristics || {};

  // Assign each ingestor a stable index (1-based).
  const ingNames = Object.keys(ingestors);
  const ingIndex = {};
  ingNames.forEach((name, i) => ingIndex[name] = i + 1);

  // Translate keys and sort alphabetically by translated key.
  const entries = Object.entries(chars)
    .map(([k, v]) => [k, tr(k), v])
    .sort((a, b) => a[1].localeCompare(b[1], lang));

  let html = '<h2>' + esc(commonNames.join(', ') || sciName) + '</h2>'
    + '<p style="font-style:italic;color:#555;margin-bottom:.75rem">' + esc(sciName) + '</p>'
    + '<table>';
  for (const [k, tk, v] of entries) {
    const src = sources[k];
    const refs = Array.isArray(src) ? ingRefs(src, ingIndex) : '';
    html += '<tr><th>' + esc(tk) + refs + '</th><td>' + renderVal(v, src, ingIndex, k) + '</td></tr>';
  }
  html += '</table>';

  if (ingNames.length) {
    html += '<div class="sources-footer"><h3>' + esc(t.sources) + '</h3><ol>';
    for (const ing of ingNames) {
      const info = ingestors[ing];
      html += '<li id="source-' + ingIndex[ing] + '"><a href="' + esc(info.source) + '" target="_blank" rel="noopener">'
        + esc(info.title) + '</a></li>';
    }
    html += '</ol></div>';
  }

  detail.innerHTML = html;
}

function ingRefs(ingestors, ingIndex) {
  if (!Array.isArray(ingestors) || !ingestors.length) return '';
  return ingestors
    .map(n => '<a class="source-ref" href="#source-' + ingIndex[n] + '">' + ingIndex[n] + '</a>')
    .join('');
}

function renderVal(v, src, ingIndex, context) {
  if (Array.isArray(v)) return v.map(i => {
    const refs = (src && typeof src === 'object' && !Array.isArray(src))
      ? ingRefs(src[String(i)], ingIndex) : '';
    return '<span class="tag">' + esc(tr(String(i), context)) + refs + '</span>';
  }).join(' ');
   if (isBooleanMap(v)) {
     return Object.entries(v).map(([k2, v2]) => {
       const sub = (src && typeof src === 'object' && !Array.isArray(src)) ? src[k2] : undefined;
       const refs = Array.isArray(sub) ? ingRefs(sub, ingIndex) : '';
       const tagClass = v2 ? 'tag' : 'tag tag-false';
       return '<span class="' + tagClass + '">' + esc(tr(k2, context)) + refs + '</span>';
     }).join(' ');
   }
   if (v && typeof v === 'object') {
     let s = '<table>';
     for (const [k2, v2] of Object.entries(v)) {
       const sub = (src && typeof src === 'object' && !Array.isArray(src)) ? src[k2] : undefined;
       const refs = Array.isArray(sub) ? ingRefs(sub, ingIndex) : '';
      s += '<tr><th>' + esc(tr(k2, context)) + refs + '</th><td>' + renderVal(v2, sub, ingIndex, k2) + '</td></tr>';
    }
    return s + '</table>';
  }
  if (typeof v === 'number' && !Number.isInteger(v))
    v = parseFloat(v.toFixed(2))
  if (typeof v === 'string') return esc(tr(v, context));
  return esc(String(v));
}

function isBooleanMap(v) {
  return !!v
    && typeof v === 'object'
    && !Array.isArray(v)
    && Object.values(v).length > 0
    && Object.values(v).every(v2 => typeof v2 === 'boolean');
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) sugBox.style.display = 'none';
});
</script>
</body>
</html>
